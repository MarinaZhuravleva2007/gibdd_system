{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg rounded-4 text-center">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <div class="bg-success bg-opacity-10 rounded-circle p-3 d-inline-block">
                            <i class="fas fa-check-double fa-4x text-success"></i>
                        </div>
                    </div>

                    <h4 class="mb-3">Пароль успешно изменен!</h4>

                    <p class="text-muted mb-4">
                        Теперь вы можете войти в систему с новым паролем.
                    </p>

                    <a href="{% url 'login' %}" class="btn btn-primary rounded-pill px-4">
                        <i class="fas fa-sign-in-alt me-2"></i>Войти в систему
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
