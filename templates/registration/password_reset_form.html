{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="bg-gradient-primary py-4" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <div class="text-center">
                        <i class="fas fa-key fa-3x text-white mb-2"></i>
                        <h4 class="text-white mb-0">Восстановление пароля</h4>
                        <p class="text-white-50 mb-0 small">Введите email для сброса пароля</p>
                    </div>
                </div>

                <div class="card-body p-4 p-lg-5">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label for="id_email" class="form-label fw-semibold">
                                <i class="fas fa-envelope me-2 text-primary"></i>Email
                            </label>
                            <input type="email" name="email" id="id_email"
                                   class="form-control form-control-lg rounded-3"
                                   placeholder="example@mail.ru"
                                   required autofocus>
                            <div class="form-text text-muted mt-2">
                                <small>Введите email, указанный при регистрации</small>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 mb-3"
                                style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none;">
                            <i class="fas fa-paper-plane me-2"></i>Отправить инструкцию
                        </button>

                        <div class="text-center">
                            <a href="{% url 'login' %}" class="text-decoration-none">
                                <i class="fas fa-arrow-left me-1"></i>Вернуться к входу
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
